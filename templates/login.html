{% extends "base.html" %}
{% block title %}Login — Smart Attendance{% endblock %}

{% block content %}
<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<!-- Background Effects -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="gradient-orb absolute w-96 h-96 bg-accent/20 -top-48 -left-48"></div>
    <div class="gradient-orb absolute w-80 h-80 bg-accent-secondary/15 -bottom-40 -right-40" style="animation-delay: -4s;"></div>
    <div class="dot-grid"></div>
</div>

<div class="min-h-screen flex items-center justify-center p-6 relative z-10">
    <div class="w-full max-w-md animate-fade-in-up">
        
        <div class="text-center mb-8">
            <h1 class="font-heading text-3xl font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-slate-400 text-sm">Login to Smart Attendance</p>
        </div>

        <div class="glass-card p-8">
            <form id="login-form" novalidate>
                <div class="input-group">
                    <input type="email" id="email" name="email" placeholder=" " autocomplete="email" required>
                    <label for="email">Email Address</label>
                    <p class="error-text" id="email-error"></p>
                </div>

                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder=" " autocomplete="current-password" required>
                    <label for="password">Password</label>
                    <p class="error-text" id="password-error"></p>
                </div>
                
                <div id="login-error" class="hidden text-rose-400 text-sm mb-4 text-center font-medium bg-rose-500/10 p-2 rounded border border-rose-500/20"></div>

                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <div class="relative flex items-center justify-center w-4 h-4 rounded border border-slate-500 bg-white/5 transition-colors group-hover:border-accent group-hover:bg-accent/10">
                            <input type="checkbox" id="remember" name="remember" class="opacity-0 absolute inset-0 cursor-pointer w-full h-full z-10">
                            <svg class="w-3 h-3 text-accent opacity-0 transition-opacity pointer-events-none check-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <span class="text-sm text-slate-400 group-hover:text-slate-300 transition-colors select-none">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-accent hover:text-accent-secondary transition-colors">Forgot password?</a>
                </div>

                <style>
                    input:checked + svg.check-icon { opacity: 1; }
                    input:checked ~ .relative { border-color: #8B5CF6; background-color: rgba(139, 92, 246, 0.1); }
                </style>

                <button type="submit" id="btn-submit" class="btn-gradient w-full">
                    Login →
                </button>
            </form>
        </div>

        <p class="text-center text-slate-500 text-sm mt-6">
            Don't have an account? <a href="/register" class="text-accent hover:text-accent-secondary transition-colors font-medium">Register</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
